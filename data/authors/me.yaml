bio: |
  My research interests lie primarily in the field of Natural Language Processing, with a focus on understanding how training dynamics shape the learned representations of Language Models. 
  I am particularly interested in curriculum learning and generally in how different data orderings influence model behavior, internal representations, and downstream performance. 
  Moreover, I am interested in leveraging human data and learning techniques to develop models whose internal mechanisms are more transparent and interpretable.

